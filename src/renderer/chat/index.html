<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 桌宠聊天</title>
<link rel="stylesheet" href="chat.css">
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <span id="char-emoji">🎀</span>
    <span id="char-name">桌宠聊天</span>
    <button id="clear-btn" title="清除历史">🗑️</button>
  </div>
  <div id="message-list"></div>
  <div id="input-area">
    <input type="text" id="chat-input" placeholder="和你的桌宠聊天..." maxlength="500" autofocus />
    <button id="send-btn">发送</button>
  </div>
</div>
<script src="chat.js"></script>
</body>
</html>
